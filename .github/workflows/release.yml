name: Release

# Tag-driven release. Mirrors zazu-ruby: test gate, tag/version check,
# then crates.io Trusted Publishing (OIDC via rust-lang/crates-io-auth-action
# — no long-lived token), then a GitHub release.
#
# One-time setup on crates.io (after the first publish): crate settings →
# Trusted Publishing → add GitHub repository getzazu/zazu-rust, workflow
# release.yml, environment crates-io.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Fetch cassettes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch-cassettes.sh
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches crate version
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "$CRATE_VERSION" ]]; then
            echo "Tag v$TAG_VERSION does not match crate version $CRATE_VERSION" >&2
            exit 1
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" --title "$tag" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)."
